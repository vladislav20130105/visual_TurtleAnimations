<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Turtle Онлайн Редактор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .controls-under-editor {
            display: flex;
            gap: 10px;
            justify-content: flex-start;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .controls-under-editor .btn {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .controls-under-editor select {
            min-width: 180px;
            background: #404040;
            color: #e0e0e0;
            border-color: #555555;
        }

        .controls-under-editor select option {
            background: #404040;
            color: #e0e0e0;
        }

        .help-text {
            color: #6c757d;
            font-size: 0.8rem;
            font-style: italic;
            margin-top: 8px;
            text-align: left;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: #404040;
            color: #e0e0e0;
            border: 2px solid #555555;
        }

        .btn-secondary:hover {
            background: #555555;
            transform: translateY(-2px);
            border-color: #666666;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .editor-container {
                grid-template-columns: 1fr;
            }
        }

        .code-panel, .canvas-panel {
            background: #2d2d2d;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #404040;
        }

        .code-panel h3, .canvas-panel h3 {
            margin-bottom: 15px;
            color: #ffffff;
            font-size: 1.3rem;
        }

        #codeEditor {
            width: 100%;
            height: 400px;
            border: 2px solid #404040;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 10px;
            resize: vertical;
            background: #1a1a1a;
            color: #e0e0e0;
        }

        #turtleCanvas {
            border: 2px solid #404040;
            border-radius: 8px;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            position: relative;
        }

        #turtleCanvas img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 6px;
        }

        .output {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            min-height: 50px;
            color: #e0e0e0;
            border: 1px solid #404040;
        }

        .output.error {
            background: #2d1b1b;
            color: #ff6b6b;
            border: 1px solid #8b0000;
        }

        .output.success {
            background: #1b2d1b;
            color: #51cf66;
            border: 1px solid #2d5a2d;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            color: white;
            opacity: 0.8;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐢 Python Turtle Онлайн Редактор</h1>
            <p>Пишите код и сразу видите результат!</p>
        </header>
        
        <main class="editor-container">
            <div class="code-panel">
                <h3>📝 Код</h3>
                <textarea id="codeEditor" placeholder="# Python Turtle код
import turtle

# Создаем черепашку
t = turtle.Turtle()
t.speed(5)

# Рисуем квадрат
for i in range(4):
    t.forward(100)
    t.right(90)

# Завершаем рисование
turtle.done()"></textarea>
                
                <div class="controls-under-editor">
                    <button id="runBtn" class="btn btn-primary">▶ Запустить</button>
                    <button id="clearBtn" class="btn btn-secondary">🗑️ Очистить</button>
                    <select id="examples" class="btn btn-secondary">
                        <option value="">📚 Выбрать пример...</option>
                        <option value="square">Квадрат</option>
                        <option value="star">Звезда</option>
                        <option value="spiral">Спираль</option>
                        <option value="flower">Цветок</option>
                        <option value="rainbow">Радуга</option>
                    </select>
                </div>
                
                <div class="help-text">
                    💡 Если код не выполнился с первого раза, попробуйте ещё раз запустить код
                </div>
            </div>
            
            <div class="canvas-panel">
                <h3>🎨 Результат</h3>
                <div id="turtleCanvas">
                    <p style="color: #6c757d;">Результат появится здесь после запуска кода</p>
                </div>
                <div id="output" class="output"></div>
            </div>
        </main>
        
        <footer>
        </footer>
    </div>
    
    <script>
        let examples = {};
        
        // Загрузка примеров при загрузке страницы
        document.addEventListener('DOMContentLoaded', function() {
            loadExamples();
            
            // Обработчики кнопок
            document.getElementById('runBtn').addEventListener('click', runCode);
            document.getElementById('clearBtn').addEventListener('click', clearAll);
            document.getElementById('examples').addEventListener('change', loadExample);
        });
        
        // Загрузка примеров с сервера
        async function loadExamples() {
            try {
                const response = await fetch('/examples');
                examples = await response.json();
            } catch (error) {
                console.error('Ошибка загрузки примеров:', error);
            }
        }
        
        // Запуск кода
        async function runCode() {
            const runBtn = document.getElementById('runBtn');
            const output = document.getElementById('output');
            const canvas = document.getElementById('turtleCanvas');
            const code = document.getElementById('codeEditor').value;
            
            runBtn.innerHTML = '<span class="loading"></span> Выполнение...';
            runBtn.disabled = true;
            
            output.innerHTML = '';
            output.className = 'output';
            
            try {
                const response = await fetch('/run_code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code: code })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    if (result.image) {
                        canvas.innerHTML = `<img src="${result.image}" alt="Turtle Graphics">`;
                    } else {
                        canvas.innerHTML = `<p style="color: #28a745;">${result.message}</p>`;
                    }
                    output.innerHTML = '✅ Код успешно выполнен!';
                    output.className = 'output success';
                } else {
                    output.innerHTML = `❌ Ошибка: ${result.error}`;
                    output.className = 'output error';
                }
                
            } catch (error) {
                output.innerHTML = `❌ Ошибка: ${error.message}`;
                output.className = 'output error';
            } finally {
                runBtn.innerHTML = '▶ Запустить';
                runBtn.disabled = false;
            }
        }
        
        // Очистка всего
        function clearAll() {
            document.getElementById('codeEditor').value = '';
            document.getElementById('turtleCanvas').innerHTML = '<p style="color: #6c757d;">Результат появится здесь после запуска кода</p>';
            document.getElementById('output').innerHTML = '';
            document.getElementById('examples').value = '';
        }
        
        // Загрузка примера
        function loadExample(event) {
            const exampleName = event.target.value;
            if (exampleName && examples[exampleName]) {
                document.getElementById('codeEditor').value = examples[exampleName];
                document.getElementById('output').innerHTML = '';
            }
        }
        
        // Горячие клавиши
        document.addEventListener('keydown', function(event) {
            // Ctrl+Enter для запуска кода
            if (event.ctrlKey && event.key === 'Enter') {
                event.preventDefault();
                runCode();
            }
            
            // Ctrl+L для очистки
            if (event.ctrlKey && event.key === 'l') {
                event.preventDefault();
                clearAll();
            }
        });
    </script>
</body>
</html>
