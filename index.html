<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Turtle Онлайн Редактор</title>
    <link rel="icon" type="image/x-icon" href="static/favicon.ico">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://skulpt.org/static/skulpt.min.js"></script>
    <script src="https://skulpt.org/static/skulpt-stdlib.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐢 Python Turtle Онлайн Редактор</h1>
            <p>Пишите код и сразу видите результат!</p>
        </header>
        
        <div class="controls">
            <button id="runBtn" class="btn btn-primary">▶ Запустить</button>
            <button id="clearBtn" class="btn btn-secondary">🗑️ Очистить</button>
            <button id="resetBtn" class="btn btn-secondary">🔄 Сбросить</button>
            <select id="examples" class="btn btn-secondary">
                <option value="">📚 Выбрать пример...</option>
                <option value="square">Квадрат</option>
                <option value="star">Звезда</option>
                <option value="spiral">Спираль</option>
                <option value="flower">Цветок</option>
                <option value="rainbow">Радуга</option>
            </select>
        </div>
        
        <main class="editor-container">
            <div class="code-panel">
                <h3>📝 Код</h3>
                <textarea id="codeEditor"># Python Turtle код
import turtle

# Создаем черепашку
t = turtle.Turtle()
t.speed(0)

colors = ['#FF006E', '#FB5607', '#FFBE0B', '#8338EC', '#3A86FF', '#06FFA5']

# Рисуем концентрические круги
for i in range(len(colors)):
    t.pencolor(colors[i])
    t.pensize(3)
    t.circle(100 - i * 15)
    
t.hideturtle()
turtle.done()</textarea>
            </div>
            
            <div class="canvas-panel">
                <h3>🎨 Результат</h3>
                <div id="turtleCanvas">
                    <canvas id="canvas" width="400" height="400"></canvas>
                </div>
                <div id="output" class="output"></div>
            </div>
        </main>
        
        <footer>
            <p>Сделано с ❤️ для изучения Python Turtle</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
